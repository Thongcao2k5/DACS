<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MotoShop</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- UI UTILITIES Placeholder -->
    <div id="pageLoader" style="display: none !important;"><div class="loader-spinner"></div></div>
    <div id="backToTop" class="back-to-top"><i class='bx bx-chevron-up'></i></div>

    <!-- COMMON COMPONENTS PLACEHOLDERS -->
    <div id="mainHeaderWrapper" class="main-header-wrapper"></div>
    <div id="searchOverlay" class="search-overlay"></div>
    <div id="mobileMenu" class="offcanvas offcanvas-start mobile-menu-offcanvas" tabindex="-1"></div>

    <!-- 1. BREADCRUMB -->
    <div class="breadcrumb-wrapper">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Đăng nhập</li>
                </ol>
            </nav>
        </div>
    </div>

    <main class="auth-wrapper">
        <div class="container">
            <!-- 2. LOGIN CONTAINER -->
            <div class="auth-card">
                <div class="auth-header">
                    <h2>CHÀO MỪNG TRỞ LẠI!</h2>
                    <p>Đăng nhập để theo dõi đơn hàng và nhận ưu đãi riêng biệt.</p>
                </div>

                <!-- 3. LOGIN FORM -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label class="form-label-custom">Email hoặc Số điện thoại *</label>
                        <input type="text" class="form-control form-control-custom" placeholder="Nhập email hoặc SĐT" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label-custom">Mật khẩu *</label>
                        <div class="password-group">
                            <input type="password" id="passwordInput" class="form-control form-control-custom" placeholder="Nhập mật khẩu" required>
                            <i class='bx bx-hide password-toggle-icon' onclick="togglePasswordVisibility()"></i>
                        </div>
                    </div>

                    <div class="auth-options">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
                        </div>
                        <a href="forgot-password.html">Quên mật khẩu?</a>
                    </div>

                    <div id="loginError" class="alert alert-danger d-none py-2 small mb-3">
                        <i class='bx bx-error-circle me-1'></i> Email hoặc mật khẩu không đúng.
                    </div>

                    <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-bold mb-4">ĐĂNG NHẬP</button>
                </form>

                <!-- 4. ADDITIONAL OPTIONS -->
                <div class="text-center">
                    <p class="text-muted small mb-0">Chưa có tài khoản? <a href="register.html" class="text-danger fw-bold text-decoration-none">Đăng ký ngay</a></p>
                </div>

                <div class="social-auth-divider">
                    <span>Hoặc đăng nhập bằng</span>
                </div>

                <div class="social-btns">
                    <a href="#" class="btn-social btn-google">
                        <i class='bx bxl-google'></i> Google
                    </a>
                    <a href="#" class="btn-social btn-facebook">
                        <i class='bx bxl-facebook-circle'></i> Facebook
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-5 mt-5"></footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header.js"></script>
    <script src="js/components.js"></script>
    <script>
        // Ẩn hiện mật khẩu
        function togglePasswordVisibility() {
            const input = document.getElementById('passwordInput');
            const icon = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bx-hide', 'bx-show');
            } else {
                input.type = 'password';
                icon.classList.replace('bx-show', 'bx-hide');
            }
        }

        // Xử lý đăng nhập demo
        function handleLogin(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('loginError');
            
            // Giả lập check sai thông tin
            errorMsg.classList.remove('d-none');
            
            // Nếu đúng thông tin (giả định)
            // window.location.href = 'index.html';
        }
    </script>
</body>
</html>
