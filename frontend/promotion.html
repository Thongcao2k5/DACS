<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khuyến mãi hot - MotoShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="mainHeaderWrapper" class="main-header-wrapper"></div>
    <div id="searchOverlay" class="search-overlay"></div>
    <div id="mobileMenu" class="offcanvas offcanvas-start mobile-menu-offcanvas" tabindex="-1"></div>
    
    <div class="container py-5 mt-5">
        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 class="display-4 fw-bolder text-uppercase">Chương trình <span class="text-danger">Khuyến mãi</span></h1>
                <p class="lead text-muted">Săn ngay phụ tùng chính hãng với giá cực hời</p>
                <hr class="w-25 mx-auto border-danger border-2 opacity-100">
            </div>
        </div>

        <!-- Banner Khuyến mãi lớn -->
        <div class="row mb-5">
            <div class="col-12">
                <div class="rounded-4 overflow-hidden shadow-lg position-relative" style="height: 300px;">
                    <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=1200" class="w-100 h-100 object-fit-cover" alt="Promo">
                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center bg-dark bg-opacity-50">
                        <div class="p-5 text-white">
                            <h2 class="display-5 fw-bold mb-3">XẢ KHO PHỤ TÙNG 2025</h2>
                            <p class="fs-4 mb-4">Giảm giá lên đến 50% cho các dòng xe SH, Winner, Exciter.</p>
                            <button class="btn btn-danger btn-lg rounded-pill px-5">XEM NGAY</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Danh sách sản phẩm khuyến mãi (JS đổ vào đây) -->
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4" id="promotionProducts">
            <!-- Loading state -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p class="mt-2">Đang tải danh sách ưu đãi...</p>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header.js"></script>
    <script src="js/components.js"></script>
    <script src="js/api-handler.js"></script>
</body>
</html>
