<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - MotoShop</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- UI UTILITIES Placeholder -->
    <div id="pageLoader" style="display: none !important;"><div class="loader-spinner"></div></div>
    <div id="backToTop" class="back-to-top"><i class='bx bx-chevron-up'></i></div>

    <!-- COMMON COMPONENTS PLACEHOLDERS -->
    <div id="mainHeaderWrapper" class="main-header-wrapper"></div>
    <div id="searchOverlay" class="search-overlay"></div>
    <div id="mobileMenu" class="offcanvas offcanvas-start mobile-menu-offcanvas" tabindex="-1"></div>

    <!-- 1. BREADCRUMB -->
    <div class="breadcrumb-wrapper">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Đăng ký tài khoản</li>
                </ol>
            </nav>
        </div>
    </div>

    <main class="auth-wrapper">
        <div class="container">
            <!-- 2. REGISTER CONTAINER -->
            <div class="auth-card">
                <div class="auth-header">
                    <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
                    <p>Trở thành thành viên MotoShop để nhận ngay các ưu đãi đặc biệt.</p>
                </div>

                <!-- 3. REGISTER FORM -->
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="mb-3">
                        <label class="form-label-custom">Họ và tên *</label>
                        <input type="text" class="form-control form-control-custom" placeholder="Nhập họ và tên của bạn" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">Email *</label>
                            <input type="email" class="form-control form-control-custom" placeholder="email@vi dụ.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Số điện thoại *</label>
                            <input type="tel" class="form-control form-control-custom" placeholder="Nhập số điện thoại" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label-custom">Mật khẩu *</label>
                        <div class="password-group">
                            <input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Tối thiểu 6 ký tự" required>
                            <i class='bx bx-hide password-toggle-icon' onclick="togglePass('regPassword', this)"></i>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Xác nhận mật khẩu *</label>
                        <div class="password-group">
                            <input type="password" id="regConfirmPassword" class="form-control form-control-custom" placeholder="Nhập lại mật khẩu" required>
                            <i class='bx bx-hide password-toggle-icon' onclick="togglePass('regConfirmPassword', this)"></i>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label text-muted small" for="termsCheck">
                                Tôi đồng ý với <a href="terms.html" class="text-danger">Điều khoản sử dụng</a> và Chính sách bảo mật của MotoShop.
                            </label>
                        </div>
                    </div>

                    <div id="registerError" class="alert alert-danger d-none py-2 small mb-3">
                        <i class='bx bx-error-circle me-1'></i> Email hoặc số điện thoại đã tồn tại.
                    </div>

                    <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-bold mb-4">ĐĂNG KÝ NGAY</button>
                </form>

                <!-- 4. ADDITIONAL OPTIONS -->
                <div class="text-center">
                    <p class="text-muted small mb-0">Đã có tài khoản? <a href="login.html" class="text-danger fw-bold text-decoration-none">Đăng nhập</a></p>
                </div>

                <div class="social-auth-divider">
                    <span>Hoặc đăng ký nhanh bằng</span>
                </div>

                <div class="social-btns">
                    <a href="#" class="btn-social btn-google">
                        <i class='bx bxl-google'></i> Google
                    </a>
                    <a href="#" class="btn-social btn-facebook">
                        <i class='bx bxl-facebook-circle'></i> Facebook
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-5 mt-5"></footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header.js"></script>
    <script src="js/components.js"></script>
    <script>
        // Hàm ẩn hiện mật khẩu dùng chung
        function togglePass(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bx-hide', 'bx-show');
            } else {
                input.type = 'password';
                icon.classList.replace('bx-show', 'bx-hide');
            }
        }

        // Xử lý đăng ký demo
        function handleRegister(e) {
            e.preventDefault();
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('registerError');

            if (pass !== confirm) {
                alert('Mật khẩu xác nhận không khớp!');
                return;
            }
            
            // Giả lập check lỗi
            errorMsg.classList.remove('d-none');
        }
    </script>
</body>
</html>
