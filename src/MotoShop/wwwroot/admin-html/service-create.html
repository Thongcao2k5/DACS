<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed" dir="ltr" data-theme="theme-default" data-assets-path="../assets/">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Thêm dịch vụ kỹ thuật - MotoShop Admin</title>
    
    <link rel="stylesheet" href="../assets/vendor/css/core.css" />
    <link rel="stylesheet" href="../assets/vendor/css/theme-default.css" />
    <link rel="stylesheet" href="../assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="../assets/css/demo.css" />
    <link rel="stylesheet" href="../assets/css/design-system.css" />
    <link rel="stylesheet" href="../assets/css/ui-interactions.css" />

    <script src="../assets/vendor/js/helpers.js"></script>
    <script src="../assets/js/config.js"></script>

    <style>
      .filter-label { font-size: 11px; font-weight: 700; color: #a1acb8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
      .card-form { border-radius: 12px; border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
      .editor-wrapper { border: 1px solid #d9dee3; border-radius: 12px; overflow: hidden; background: #fff; min-height: 500px; }
      .ck-editor__editable { min-height: 450px !important; }
      .image-upload-box { width: 100%; height: 120px; border: 2px dashed #d9dee3; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: 0.3s; background: #f8f9fa; }
      .section-title { font-weight: 800; text-transform: uppercase; color: var(--ds-text-heading); font-size: 0.85rem; border-left: 4px solid var(--ds-primary); padding-left: 10px; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <script src="../assets/js/sidebar.js"></script>
        <div class="layout-page">
          <nav class="layout-navbar container-xxl navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme" id="layout-navbar">
            <div class="layout-menu-toggle navbar-nav align-items-xl-center me-3 me-xl-0 d-xl-none">
              <a class="nav-item nav-link px-0 me-xl-4" href="javascript:void(0)"><i class="bx bx-menu bx-sm"></i></a>
            </div>
            <h5 class="m-0 text-muted fw-light">Dịch vụ / <span class="text-dark fw-bold">Thêm mới</span></h5>
          </nav>

          <div class="content-wrapper">
            <div class="container-xxl flex-grow-1 container-p-y">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-uppercase text-primary">Tạo dịch vụ kỹ thuật mới</h4>
                <div class="d-flex gap-2">
                  <a href="services.html" class="btn btn-outline-secondary">Hủy bỏ</a>
                  <button class="btn btn-primary px-4" id="btnSave" onclick="handleSave()">Lưu dịch vụ</button>
                </div>
              </div>

              <div class="row">
                <div class="col-lg-8">
                  <div class="card card-form">
                    <div class="card-body">
                      <div class="section-title">Thông tin dịch vụ</div>
                      <div class="mb-3">
                        <label class="filter-label">Tên dịch vụ <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg" placeholder="VD: Vệ sinh kim phun điện tử">
                      </div>
                      <div class="mb-3">
                        <label class="filter-label">Mô tả ngắn</label>
                        <textarea class="form-control" rows="3" placeholder="Tóm tắt ngắn gọn dịch vụ..."></textarea>
                      </div>
                    </div>
                  </div>

                  <div class="card card-form">
                    <div class="card-body">
                      <div class="section-title">Nội dung chi tiết (HTML)</div>
                      <div class="editor-wrapper"><div id="editor"></div></div>
                    </div>
                  </div>
                </div>

                <div class="col-lg-4">
                  <div class="card card-form">
                    <div class="card-body">
                      <div class="section-title">Giá & Thời gian</div>
                      <div class="mb-3">
                        <label class="filter-label">Giá dịch vụ (đ)</label>
                        <input type="number" class="form-control fw-bold text-danger" value="0">
                      </div>
                      <div class="mb-3">
                        <label class="filter-label">Thời gian dự kiến (phút)</label>
                        <input type="number" class="form-control" value="30">
                      </div>
                    </div>
                  </div>

                  <div class="card card-form">
                    <div class="card-body">
                      <div class="section-title">Hình ảnh đại diện</div>
                      <div class="image-upload-box mb-3">
                        <i class="bx bx-image-add fs-2 text-muted"></i>
                        <span class="small">Chọn ảnh bìa dịch vụ</span>
                      </div>
                    </div>
                  </div>

                  <div class="card card-form">
                    <div class="card-body">
                      <div class="section-title">Cấu hình SEO</div>
                      <div class="mb-3">
                        <label class="filter-label">Slug</label>
                        <input type="text" class="form-control form-control-sm" placeholder="ve-sinh-kim-phun">
                      </div>
                      <div>
                        <label class="filter-label">Trạng thái</label>
                        <div class="form-check form-switch mt-2">
                          <input class="form-check-input" type="checkbox" checked>
                          <label class="form-check-label fw-bold">Đang hoạt động</label>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/vendor/libs/ckeditor/ckeditor.js"></script>
    <script src="../assets/vendor/libs/jquery/jquery.js"></script>
    <script src="../assets/vendor/js/bootstrap.js"></script>
    <script src="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="../assets/vendor/js/menu.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/design-system.js"></script>
    <script src="../assets/js/ui-interactions.js"></script>

    <script>
      let editorInstance;
      window.addEventListener('load', () => {
        if (typeof CKEDITOR !== 'undefined') {
          CKEDITOR.ClassicEditor
            .create(document.querySelector('#editor'), {
              toolbar: {
                items: ['heading', '|', 'fontSize', 'fontColor', 'highlight', '|', 'bold', 'italic', 'underline', '|', 'alignment', '|', 'numberedList', 'bulletedList', '|', 'link', 'uploadImage', 'insertTable', 'mediaEmbed', '|', 'sourceEditing', '|', 'undo', 'redo'],
                shouldNotGroupWhenFull: true
              },
              removePlugins: ['AIAssistant', 'CKBox', 'CKFinder', 'EasyImage', 'RealTimeCollaborativeComments', 'RealTimeCollaborativeTrackChanges', 'RealTimeCollaborativeRevisionHistory', 'PresenceList', 'Comments', 'TrackChanges', 'TrackChangesData', 'RevisionHistory', 'Pagination', 'WProofreader', 'MathType', 'SlashCommand', 'Template', 'DocumentOutline', 'FormatPainter', 'TableOfContents', 'PasteFromOfficeEnhanced', 'CaseChange', 'MultiLevelList', 'ExportPdf', 'ExportWord'],
              placeholder: 'Mô tả quy trình dịch vụ và vật tư sử dụng...',
              language: 'vi'
            })
            .then(editor => { editorInstance = editor; });
        }
      });

      function handleSave() {
        const btn = document.getElementById('btnSave');
        DS.loading.btnStart(btn);
        setTimeout(() => {
          DS.loading.btnStop(btn);
          DS.showToast('Đã lưu dịch vụ thành công!', 'success');
          setTimeout(() => { location.href = 'services.html'; }, 1000);
        }, 1200);
      }
    </script>
  </body>
</html>
