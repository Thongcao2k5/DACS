<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed" dir="ltr" data-theme="theme-default" data-assets-path="../assets/">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Chuyên mục Blog - MotoShop Admin</title>
    
    <link rel="stylesheet" href="../assets/vendor/css/core.css" />
    <link rel="stylesheet" href="../assets/vendor/css/theme-default.css" />
    <link rel="stylesheet" href="../assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="../assets/css/demo.css" />
    <link rel="stylesheet" href="../assets/css/design-system.css" />
    <link rel="stylesheet" href="../assets/css/ui-interactions.css" />
    <link rel="stylesheet" href="../assets/css/pagination-component.css" />

    <script src="../assets/vendor/js/helpers.js"></script>
    <script src="../assets/js/config.js"></script>

    <style>
      .filter-label { font-size: 11px; font-weight: 700; color: #a1acb8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <script src="../assets/js/sidebar.js"></script>
        
        <div class="layout-page">
          <nav class="layout-navbar container-xxl navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme" id="layout-navbar">
            <div class="layout-menu-toggle navbar-nav align-items-xl-center me-3 me-xl-0 d-xl-none">
              <a class="nav-item nav-link px-0 me-xl-4" href="javascript:void(0)"><i class="bx bx-menu bx-sm"></i></a>
            </div>
            <h5 class="m-0 text-muted fw-light">Nội dung / <span class="text-dark fw-bold">Chuyên mục Blog</span></h5>
          </nav>

          <div class="content-wrapper">
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-uppercase">Chuyên mục Bài viết</h4>
                <button class="btn btn-primary" onclick="openCatModal('create')"><i class="bx bx-plus me-1"></i>Thêm chuyên mục</button>
              </div>

              <div class="card border shadow-sm overflow-hidden">
                <div class="table-responsive text-nowrap">
                  <table class="table table-hover m-0">
                    <thead class="table-light">
                      <tr>
                        <th>Tên chuyên mục</th>
                        <th>Đường dẫn (Slug)</th>
                        <th class="text-center">Số bài viết</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Hành động</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td><span class="fw-bold text-dark">Kiến thức xe</span></td>
                        <td><code>kien-thuc-xe</code></td>
                        <td class="text-center"><span class="badge bg-label-info">8</span></td>
                        <td><span class="ds-badge ds-badge-success">Hiển thị</span></td>
                        <td class="text-end">
                          <button class="btn btn-sm btn-icon text-primary" onclick="openCatModal('edit', 'Kiến thức xe')"><i class="bx bx-edit-alt"></i></button>
                          <button class="btn btn-sm btn-icon text-danger"><i class="bx bx-trash"></i></button>
                        </td>
                      </tr>
                      <tr>
                        <td><span class="fw-bold text-dark">Tin tức MotoShop</span></td>
                        <td><code>tin-tuc-motoshop</code></td>
                        <td class="text-center"><span class="badge bg-label-info">4</span></td>
                        <td><span class="ds-badge ds-badge-success">Hiển thị</span></td>
                        <td class="text-end">
                          <button class="btn btn-sm btn-icon text-primary"><i class="bx bx-edit-alt"></i></button>
                          <button class="btn btn-sm btn-icon text-danger"><i class="bx bx-trash"></i></button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Category -->
    <div class="modal fade" id="catModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content shadow-lg border-0">
          <div class="modal-header border-bottom p-4">
            <h5 class="modal-title fw-bold" id="modalTitle">Thêm chuyên mục</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <div class="mb-3">
              <label class="filter-label">Tên chuyên mục</label>
              <input type="text" id="catName" class="form-control" placeholder="VD: Hướng dẫn sử dụng">
            </div>
            <div>
              <label class="filter-label">Thứ tự hiển thị</label>
              <input type="number" class="form-control" value="0">
            </div>
          </div>
          <div class="modal-footer border-top p-3 px-4">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
            <button class="btn btn-primary px-4" onclick="DS.showToast('Đã lưu chuyên mục!', 'success'); bootstrap.Modal.getInstance(document.getElementById('catModal')).hide();">Lưu dữ liệu</button>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/vendor/libs/jquery/jquery.js"></script>
    <script src="../assets/vendor/js/bootstrap.js"></script>
    <script src="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="../assets/vendor/js/menu.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/design-system.js"></script>
    <script src="../assets/js/ui-interactions.js"></script>

    <script>
      function openCatModal(mode, name = '') {
        document.getElementById('modalTitle').innerText = mode === 'create' ? 'Thêm chuyên mục' : 'Chỉnh sửa chuyên mục';
        if(mode === 'edit') document.getElementById('catName').value = name;
        new bootstrap.Modal(document.getElementById('catModal')).show();
      }
    </script>
  </body>
</html>
