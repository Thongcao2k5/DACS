<!DOCTYPE html>
<html lang="vi" class="light-style layout-menu-fixed" dir="ltr" data-theme="theme-default" data-assets-path="../assets/">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Quản lý Banners - MotoShop Admin</title>
    
    <link rel="stylesheet" href="../assets/vendor/css/core.css" />
    <link rel="stylesheet" href="../assets/vendor/css/theme-default.css" />
    <link rel="stylesheet" href="../assets/vendor/fonts/boxicons.css" />
    <link rel="stylesheet" href="../assets/css/demo.css" />
    <link rel="stylesheet" href="../assets/css/design-system.css" />
    <link rel="stylesheet" href="../assets/css/ui-interactions.css" />

    <script src="../assets/vendor/js/helpers.js"></script>
    <script src="../assets/js/config.js"></script>

    <style>
      .banner-group-title { font-weight: 800; color: var(--ds-text-heading); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
      .banner-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
      .filter-label { font-size: 11px; font-weight: 700; color: #a1acb8; text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <script src="../assets/js/sidebar.js"></script>
        
        <div class="layout-page">
          <nav class="layout-navbar container-xxl navbar navbar-expand-xl navbar-detached align-items-center bg-navbar-theme" id="layout-navbar">
            <div class="layout-menu-toggle navbar-nav align-items-xl-center me-3 me-xl-0 d-xl-none">
              <a class="nav-item nav-link px-0 me-xl-4" href="javascript:void(0)"><i class="bx bx-menu bx-sm"></i></a>
            </div>
            <h5 class="m-0 text-muted fw-light">Nội dung / <span class="text-dark fw-bold">Banner tĩnh</span></h5>
          </nav>

          <div class="content-wrapper">
            <div class="container-xxl flex-grow-1 container-p-y">
              
              <h4 class="fw-bold mb-4 text-uppercase">Cấu hình Banner Website</h4>

              <!-- Vị trí: Đầu trang -->
              <div class="mb-5">
                <h5 class="banner-group-title"><i class="bx bx-dock-top me-2"></i>Khu vực Đầu trang (Top Banners)</h5>
                <div class="row">
                  <div class="col-md-6">
                    <div class="card border shadow-none">
                      <div class="card-body">
                        <label class="filter-label">Banner trái</label>
                        <img src="../assets/img/elements/13.jpg" class="banner-preview shadow-sm">
                        <div class="input-group input-group-sm mb-2">
                          <span class="input-group-text">Link</span>
                          <input type="text" class="form-control" value="/category/phu-tung">
                        </div>
                        <button class="btn btn-sm btn-primary w-100"><i class="bx bx-upload me-1"></i>Thay đổi ảnh</button>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card border shadow-none">
                      <div class="card-body">
                        <label class="filter-label">Banner phải</label>
                        <img src="../assets/img/elements/17.jpg" class="banner-preview shadow-sm">
                        <div class="input-group input-group-sm mb-2">
                          <span class="input-group-text">Link</span>
                          <input type="text" class="form-control" value="/category/nhot">
                        </div>
                        <button class="btn btn-sm btn-primary w-100"><i class="bx bx-upload me-1"></i>Thay đổi ảnh</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Vị trí: Giữa trang -->
              <div>
                <h5 class="banner-group-title"><i class="bx bx-layout me-2"></i>Khu vực Giữa trang (Middle Banner)</h5>
                <div class="card border shadow-none">
                  <div class="card-body text-center">
                    <label class="filter-label text-start">Banner ngang khổ lớn (1200x250px)</label>
                    <img src="../assets/img/elements/backgrounds/1.jpg" class="banner-preview shadow-sm" style="height: 200px;">
                    <div class="row g-2 justify-content-center mt-2">
                      <div class="col-md-6">
                        <div class="input-group input-group-sm">
                          <span class="input-group-text">Link</span>
                          <input type="text" class="form-control" placeholder="URL quảng cáo...">
                        </div>
                      </div>
                      <div class="col-md-2">
                        <button class="btn btn-sm btn-primary w-100">Cập nhật</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/vendor/libs/jquery/jquery.js"></script>
    <script src="../assets/vendor/js/bootstrap.js"></script>
    <script src="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="../assets/vendor/js/menu.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/design-system.js"></script>
    <script src="../assets/js/ui-interactions.js"></script>
  </body>
</html>
